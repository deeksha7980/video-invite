<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nams & Venki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;

      /* 👑 Your border image */
      background: url("border.jpeg") no-repeat center center;
      background-size: cover;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      height: 100vh;
      width: 100%;
      object-fit: contain;
    }

    .tap-text {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <video id="vid" autoplay muted playsinline>
    <source src="Nams.mp4" type="video/mp4">
    </video>

    <div class="tap-text"></div>

  </div>

  <script>
    const video = document.getElementById("vid");

    document.body.addEventListener("click", () => {
      video.muted = false;
      video.play();
    });
  </script>

</body>
</html>
