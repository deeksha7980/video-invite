<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invite 💍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: rgb(165, 93, 105);
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      animation: fadeIn 1.5s ease-in-out;
    }

    video {
      width: 100%;
      height: 100vh;
      object-fit: cover; /* change to 'contain' if needed */
    }

    .tap-text {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

  <div class="container">
    
    <!-- VIDEO -->
    <video id="vid" autoplay muted loop playsinline>
      <source src="Nams.mp4" type="video/mp4">
    </video>

    <!-- SOUND HINT -->
    <div class="tap-text"></div>

  </div>

  <!-- SOUND ENABLE SCRIPT -->
  <script>
    const video = document.getElementById("vid");

    document.body.addEventListener("click", () => {
      video.muted = false;
      video.play();
    });
  </script>

</body>
</html>
